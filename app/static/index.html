<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Agent MVP</title>
<style>
  :root {
    --bg: #f4f6f9;
    --chat-bg: #ffffff;
    --user-bubble: #4f80ff;
    --agent-bubble: #f0f2f5;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --card-bg: #ffffff;
    --card-border: #e5e7eb;
    --header-bg: #1a1a2e;
  }
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); height: 100vh; display: flex; flex-direction: column; }

  /* Header */
  header { background: var(--header-bg); color: #fff; padding: 14px 24px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 1rem; font-weight: 600; }
  .badge { font-size: 0.65rem; background: #4f80ff; padding: 2px 8px; border-radius: 999px; }

  /* Chat area */
  #chat { flex: 1; overflow-y: auto; padding: 24px 16px; display: flex; flex-direction: column; gap: 18px; }

  .msg-row { display: flex; }
  .msg-row.user  { justify-content: flex-end; }
  .msg-row.agent { justify-content: flex-start; }

  .bubble {
    max-width: 72%;
    padding: 12px 16px;
    border-radius: 16px;
    line-height: 1.6;
    font-size: 0.9rem;
    white-space: pre-wrap;
  }
  .user  .bubble { background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
  .agent .bubble { background: var(--agent-bubble); color: var(--text); border-bottom-left-radius: 4px; }

  .agent-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; margin-left: 4px; }

  /* Cards wrapper */
  .cards { display: flex; flex-direction: column; gap: 14px; max-width: 720px; }

  /* Base card */
  .card {
    background: var(--card-bg);
    border: 1px solid var(--card-border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.06);
  }
  .card-header {
    background: #f8f9fb;
    border-bottom: 1px solid var(--card-border);
    padding: 10px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 6px;
  }
  .card-body { padding: 14px 16px; }
  .card-footer { padding: 8px 16px; border-top: 1px solid var(--card-border); font-size: 0.72rem; color: var(--muted); }

  /* Weather calendar */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; }
  .cal-dow  { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); padding: 4px 0; }
  .cal-dow:first-child { color: #e74c3c; }
  .cal-dow:last-child  { color: #3498db; }
  .cal-day {
    text-align: center;
    padding: 6px 2px;
    border-radius: 8px;
    font-size: 0.75rem;
    background: #f8f9fb;
  }
  .cal-day .dn   { font-weight: 600; margin-bottom: 2px; font-size: 0.78rem; }
  .cal-day .icon { font-size: 1.1rem; line-height: 1; }
  .cal-day .tmp  { font-size: 0.65rem; color: var(--muted); margin-top: 1px; }
  .cal-day.today { background: #eff4ff; border: 1px solid #4f80ff; }
  .cal-empty     { background: transparent; }

  /* Golf table */
  .golf-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
  .golf-table th { background: #f8f9fb; padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
  .golf-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .golf-table tr:last-child td { border-bottom: none; }
  .tee-chips { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 4px; }
  .tee-chip  { background: #eff4ff; color: #4f80ff; border-radius: 4px; padding: 1px 6px; font-size: 0.72rem; }
  .no-data   { color: var(--muted); font-size: 0.82rem; }

  /* Schedule list */
  .sch-day   { margin-bottom: 14px; }
  .sch-date  { font-size: 0.8rem; font-weight: 700; color: #4f80ff; margin-bottom: 6px; }
  .sch-item  { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .sch-item:last-child { border-bottom: none; }
  .sch-time  { color: var(--muted); width: 42px; flex-shrink: 0; }
  .sch-empty { color: var(--muted); font-size: 0.82rem; }

  /* Input */
  #input-area {
    border-top: 1px solid var(--border);
    background: var(--chat-bg);
    padding: 14px 16px;
    display: flex;
    gap: 10px;
  }
  #user-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.9rem;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
  }
  #user-input:focus { border-color: #4f80ff; }
  #send-btn {
    background: #4f80ff;
    color: #fff;
    border: none;
    border-radius: 10px;
    padding: 0 20px;
    font-size: 0.9rem;
    font-weight: 600;
    cursor: pointer;
    white-space: nowrap;
  }
  #send-btn:disabled { background: #a0b4d9; cursor: not-allowed; }

  /* Typing indicator */
  .typing { display: flex; gap: 4px; padding: 10px 14px; }
  .typing span { width: 8px; height: 8px; border-radius: 50%; background: #a0b4d9; animation: blink 1.2s infinite; }
  .typing span:nth-child(2) { animation-delay: 0.2s; }
  .typing span:nth-child(3) { animation-delay: 0.4s; }
  @keyframes blink { 0%,80%,100% { opacity:.3; } 40% { opacity:1; } }
</style>
</head>
<body>

<header>
  <span>🤖</span>
  <h1>Secure Agent MVP</h1>
  <span class="badge">MAF · gpt-4.5</span>
</header>

<div id="chat">
  <div class="msg-row agent">
    <div>
      <div class="agent-name">SuperAgent</div>
      <div class="bubble">안녕하세요! 날씨, 골프장 예약, 일정을 조회해 드립니다.<br><br>예시 질문:<br>• "이번 달 서울 날씨 알려줘"<br>• "이번 주말 수도권 골프장 예약 가능한 데 있어?"<br>• "이번 주 내 일정 보여줘"<br>• "다음 주말 날씨랑 골프장 동시에 알려줘"</div>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요… (Ctrl+Enter로 줄바꿈, Enter로 전송)"></textarea>
  <button id="send-btn" onclick="sendMessage()">전송</button>
</div>

<script>
const chatEl   = document.getElementById('chat');
const inputEl  = document.getElementById('user-input');
const sendBtn  = document.getElementById('send-btn');
let sessionId  = '';

// Auto-resize textarea
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});

inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) {
    e.preventDefault();
    sendMessage();
  }
});

function appendUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chatEl.appendChild(row);
  scrollDown();
}

function appendTyping() {
  const row = document.createElement('div');
  row.className = 'msg-row agent typing-row';
  row.innerHTML = `<div><div class="agent-name">SuperAgent</div><div class="bubble"><div class="typing"><span></span><span></span><span></span></div></div></div>`;
  chatEl.appendChild(row);
  scrollDown();
  return row;
}

function removeTyping() {
  document.querySelectorAll('.typing-row').forEach(el => el.remove());
}

function appendAgentMsg(text, cards) {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  let inner = `<div class="agent-name">SuperAgent</div>`;
  if (text) inner += `<div class="bubble">${escHtml(text)}</div>`;
  if (cards && cards.length) {
    inner += `<div class="cards">${cards.map(renderCard).join('')}</div>`;
  }
  row.innerHTML = `<div>${inner}</div>`;
  chatEl.appendChild(row);
  scrollDown();
}

async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  appendUserMsg(text);
  const typingRow = appendTyping();

  try {
    const res = await fetch('/api/v1/chat', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId}),
    });
    const data = await res.json();
    sessionId = data.session_id || sessionId;
    removeTyping();
    appendAgentMsg(data.text, data.cards);
  } catch (err) {
    removeTyping();
    appendAgentMsg('⚠️ 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.', []);
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

function scrollDown() {
  chatEl.scrollTop = chatEl.scrollHeight;
}

function escHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}

// ── Card renderers ────────────────────────────────────────────────────────────

function renderCard(card) {
  switch (card.type) {
    case 'weather_calendar': return renderWeather(card.data);
    case 'golf_slots':       return renderGolf(card.data);
    case 'schedule_list':    return renderSchedule(card.data);
    default:                 return `<div class="card"><div class="card-body">${JSON.stringify(card)}</div></div>`;
  }
}

function renderWeather(d) {
  const dows = ['일','월','화','수','목','금','토'];
  const today = new Date().toISOString().slice(0,10);

  // figure out first weekday of month
  const firstDay = new Date(d.year, d.month - 1, 1).getDay(); // 0=Sun

  let grid = dows.map(w => `<div class="cal-dow">${w}</div>`).join('');

  // Empty cells before first day
  for (let i = 0; i < firstDay; i++) grid += `<div class="cal-day cal-empty"></div>`;

  for (const day of d.days) {
    const dn = parseInt(day.date.slice(-2));
    const isToday = day.date === today;
    grid += `
      <div class="cal-day${isToday ? ' today' : ''}">
        <div class="dn">${dn}</div>
        <div class="icon">${day.icon}</div>
        <div class="tmp">${day.min_temp}°~${day.max_temp}°</div>
      </div>`;
  }

  return `
    <div class="card">
      <div class="card-header">🗓️ ${d.year}년 ${d.month}월 날씨 (${d.location})</div>
      <div class="card-body"><div class="cal-grid">${grid}</div></div>
      <div class="card-footer">※ 14일 이후는 기후 평년값 기반 예측</div>
    </div>`;
}

function renderGolf(d) {
  if (!d.courses || d.courses.length === 0) {
    return `<div class="card"><div class="card-header">⛳ 골프장 예약 현황</div><div class="card-body"><p class="no-data">조회 기간(${d.date_from} ~ ${d.date_to}) 내 예약 가능한 슬롯이 없습니다.</p></div></div>`;
  }

  const rows = d.courses.map(c => `
    <tr>
      <td><strong>${c.name}</strong><br><span style="color:var(--muted);font-size:.75rem">${c.region}</span></td>
      <td>${c.date}</td>
      <td>${c.available_slots}타임<div class="tee-chips">${c.tee_times.map(t=>`<span class="tee-chip">${t}</span>`).join('')}</div></td>
      <td>${c.price_range}</td>
    </tr>`).join('');

  return `
    <div class="card">
      <div class="card-header">⛳ 수도권 골프장 예약 현황 (${d.date_from} ~ ${d.date_to})</div>
      <div class="card-body" style="overflow-x:auto">
        <table class="golf-table">
          <thead><tr><th>골프장</th><th>날짜</th><th>가능 슬롯</th><th>가격대</th></tr></thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
      <div class="card-footer">기준일: ${d.query_time} · 캐시 TTL 30분 · robots.txt 준수</div>
    </div>`;
}

function renderSchedule(d) {
  const dateLabels = {0:'(월)',1:'(화)',2:'(수)',3:'(목)',4:'(금)',5:'(토)',6:'(일)'};

  let content = '';
  for (const [dateStr, events] of Object.entries(d.schedules)) {
    const dt = new Date(dateStr);
    const dow = dateLabels[dt.getDay()];
    const label = `${dateStr.slice(5)} ${dow}`;
    let items = '';
    if (events.length === 0) {
      items = `<div class="sch-empty">일정 없음</div>`;
    } else {
      items = events.map(e => `
        <div class="sch-item">
          <span class="sch-time">${e.time}</span>
          <span>${escHtml(e.title)}</span>
        </div>`).join('');
    }
    content += `<div class="sch-day"><div class="sch-date">${label}</div>${items}</div>`;
  }

  return `
    <div class="card">
      <div class="card-header">📅 내 일정 (${d.date_from} ~ ${d.date_to})</div>
      <div class="card-body">${content}</div>
      <div class="card-footer">Mock MSA · seed=42 · 동일 날짜 동일 결과 보장</div>
    </div>`;
}
</script>
</body>
</html>
