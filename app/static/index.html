<!DOCTYPE html>
<html lang="ko" data-theme="light">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Secure Agent MVP</title>
<style>
  /* ── Theme variables ── */
  :root[data-theme="light"] {
    --bg: #f4f6f9;
    --chat-bg: #ffffff;
    --user-bubble: #4f80ff;
    --agent-bubble: #f0f2f5;
    --text: #1a1a2e;
    --muted: #6b7280;
    --border: #e5e7eb;
    --card-bg: #ffffff;
    --card-header-bg: #f8f9fb;
    --header-bg: #1a1a2e;
    --input-bg: #ffffff;
    --toggle-bg: #e5e7eb;
    --toggle-knob: #ffffff;
    --toggle-icon: "🌙";
  }
  :root[data-theme="dark"] {
    --bg: #0f1117;
    --chat-bg: #1a1d27;
    --user-bubble: #3b6aff;
    --agent-bubble: #252836;
    --text: #e8eaf0;
    --muted: #8b92a5;
    --border: #2e3147;
    --card-bg: #1e2130;
    --card-header-bg: #252836;
    --header-bg: #0d0f18;
    --input-bg: #252836;
    --toggle-bg: #4f80ff;
    --toggle-knob: #ffffff;
    --toggle-icon: "☀️";
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: var(--bg); font-family: 'Segoe UI', sans-serif; color: var(--text); height: 100vh; display: flex; flex-direction: column; transition: background .25s, color .25s; }

  /* ── Header ── */
  header { background: var(--header-bg); color: #fff; padding: 12px 20px; display: flex; align-items: center; gap: 10px; }
  header h1 { font-size: 1rem; font-weight: 600; flex: 1; }
  .badge { font-size: 0.65rem; background: #4f80ff; padding: 2px 8px; border-radius: 999px; }

  /* ── Dark/Light toggle ── */
  .theme-toggle { display: flex; align-items: center; gap: 8px; cursor: pointer; user-select: none; }
  .toggle-track {
    width: 44px; height: 24px;
    background: var(--toggle-bg);
    border-radius: 999px;
    position: relative;
    transition: background .25s;
    flex-shrink: 0;
  }
  .toggle-knob {
    width: 18px; height: 18px;
    background: var(--toggle-knob);
    border-radius: 50%;
    position: absolute;
    top: 3px; left: 3px;
    transition: transform .25s;
  }
  [data-theme="dark"] .toggle-knob { transform: translateX(20px); }
  .toggle-label { font-size: 0.75rem; color: #ffffffaa; }

  /* ── Chat area ── */
  #chat { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 18px; }

  .msg-row { display: flex; }
  .msg-row.user  { justify-content: flex-end; }
  .msg-row.agent { justify-content: flex-start; width: 100%; }
  .msg-row.agent > div { width: 100%; }

  .agent-name { font-size: 0.72rem; color: var(--muted); margin-bottom: 4px; margin-left: 2px; }

  .bubble {
    display: inline-block;
    padding: 11px 15px;
    border-radius: 16px;
    line-height: 1.65;
    font-size: 0.88rem;
    white-space: pre-wrap;
    word-break: break-word;
  }
  .user  .bubble { max-width: 72%; background: var(--user-bubble); color: #fff; border-bottom-right-radius: 4px; }
  .agent .bubble { max-width: 80%; background: var(--agent-bubble); color: var(--text); border-bottom-left-radius: 4px; }

  /* ── Status indicator ── */
  .stream-status {
    display: flex; align-items: center; gap: 7px;
    font-size: 0.8rem; color: var(--muted);
    padding: 6px 2px; margin-bottom: 6px;
  }
  .status-dots { display: flex; gap: 4px; }
  .status-dots span {
    width: 6px; height: 6px; border-radius: 50%;
    background: #4f80ff;
    animation: pulse 1.2s infinite;
  }
  .status-dots span:nth-child(2) { animation-delay: .2s; }
  .status-dots span:nth-child(3) { animation-delay: .4s; }
  @keyframes pulse { 0%,80%,100% { opacity:.25; transform:scale(.8); } 40% { opacity:1; transform:scale(1.1); } }

  /* ── Cards ── */
  .cards { display: flex; flex-direction: column; gap: 12px; width: 100%; margin-top: 8px; }

  .card {
    background: var(--card-bg);
    border: 1px solid var(--border);
    border-radius: 12px;
    overflow: hidden;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    transition: background .25s, border-color .25s;
  }
  .card-header {
    background: var(--card-header-bg);
    border-bottom: 1px solid var(--border);
    padding: 10px 16px;
    font-size: 0.85rem;
    font-weight: 600;
    display: flex; align-items: center; gap: 6px;
  }
  .card-body { padding: 14px 16px; overflow-x: auto; }
  .card-footer { padding: 7px 16px; border-top: 1px solid var(--border); font-size: 0.7rem; color: var(--muted); }

  /* ── Weather calendar ── */
  .cal-grid { display: grid; grid-template-columns: repeat(7, 1fr); gap: 4px; min-width: 360px; }
  .cal-dow { text-align: center; font-size: 0.7rem; font-weight: 600; color: var(--muted); padding: 4px 0; }
  .cal-dow:first-child { color: #e74c3c; }
  .cal-dow:last-child  { color: #3498db; }
  .cal-day { text-align: center; padding: 6px 2px; border-radius: 8px; background: var(--card-header-bg); font-size: 0.75rem; }
  .cal-day .dn  { font-weight: 600; margin-bottom: 2px; }
  .cal-day .icon { font-size: 1.05rem; line-height: 1; }
  .cal-day .tmp { font-size: 0.62rem; color: var(--muted); margin-top: 1px; }
  .cal-day.today { background: #eff4ff; border: 1px solid #4f80ff; }
  [data-theme="dark"] .cal-day.today { background: #1e2f5e; }
  .cal-empty { background: transparent !important; }

  /* ── Golf table ── */
  .golf-table { width: 100%; border-collapse: collapse; font-size: 0.82rem; min-width: 420px; }
  .golf-table th { background: var(--card-header-bg); padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); }
  .golf-table td { padding: 8px 10px; border-bottom: 1px solid var(--border); vertical-align: top; }
  .golf-table tr:last-child td { border-bottom: none; }
  .tee-chips { display: flex; flex-wrap: wrap; gap: 3px; margin-top: 4px; }
  .tee-chip  { background: #eff4ff; color: #4f80ff; border-radius: 4px; padding: 1px 6px; font-size: 0.7rem; }
  [data-theme="dark"] .tee-chip { background: #1e2f5e; }
  .no-data { color: var(--muted); font-size: 0.82rem; }

  /* ── Schedule ── */
  .sch-day { margin-bottom: 14px; }
  .sch-day:last-child { margin-bottom: 0; }
  .sch-date { font-size: 0.8rem; font-weight: 700; color: #4f80ff; margin-bottom: 6px; }
  .sch-item { display: flex; gap: 10px; padding: 6px 0; border-bottom: 1px solid var(--border); font-size: 0.82rem; }
  .sch-item:last-child { border-bottom: none; }
  .sch-time  { color: var(--muted); width: 42px; flex-shrink: 0; }
  .sch-empty { color: var(--muted); font-size: 0.82rem; font-style: italic; }

  /* ── Input area ── */
  #input-area {
    border-top: 1px solid var(--border);
    background: var(--chat-bg);
    padding: 12px 20px;
    display: flex; gap: 10px;
    transition: background .25s;
  }
  #user-input {
    flex: 1;
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    font-size: 0.88rem;
    outline: none;
    resize: none;
    font-family: inherit;
    line-height: 1.5;
    background: var(--input-bg);
    color: var(--text);
    transition: background .25s, border-color .25s, color .25s;
  }
  #user-input:focus { border-color: #4f80ff; }
  #send-btn {
    background: #4f80ff; color: #fff;
    border: none; border-radius: 10px;
    padding: 0 22px; font-size: 0.88rem; font-weight: 600;
    cursor: pointer; white-space: nowrap;
  }
  #send-btn:disabled { background: #7fa0e0; cursor: not-allowed; }

  /* ── Recommendation card ── */
  .rec-card { border: 2px solid #FFD700 !important; }
  [data-theme="dark"] .rec-card { border-color: #b8960c !important; }
  .criteria-bar { font-size: .75rem; color: var(--muted); margin-bottom: 12px; padding: 7px 12px; background: var(--card-header-bg); border-radius: 8px; }
  .rec-table { width: 100%; border-collapse: collapse; font-size: .82rem; min-width: 620px; }
  .rec-table th { background: var(--card-header-bg); padding: 8px 10px; text-align: left; font-weight: 600; border-bottom: 1px solid var(--border); white-space: nowrap; }
  .rec-table td { padding: 9px 10px; border-bottom: 1px solid var(--border); vertical-align: middle; }
  .rec-table tr:last-child td { border-bottom: none; }
  .rec-table tbody tr:hover { background: var(--agent-bubble); }
  .rank-badge {
    display: inline-flex; align-items: center; justify-content: center;
    width: 26px; height: 26px; border-radius: 50%;
    font-weight: 700; font-size: .8rem; color: #333;
  }
  .rank-1 { background: #FFD700; }
  .rank-2 { background: #C0C0C0; }
  .rank-3 { background: #CD7F32; color: #fff; }
  .rank-4, .rank-5 { background: #e8eaf0; }
  [data-theme="dark"] .rank-4, [data-theme="dark"] .rank-5 { background: #2e3147; color: #e8eaf0; }
  .weekend-badge { font-size: .62rem; background: #4f80ff; color: #fff; padding: 1px 5px; border-radius: 4px; margin-left: 4px; vertical-align: middle; }
  .course-link { color: #4f80ff; text-decoration: none; font-weight: 600; }
  .course-link:hover { text-decoration: underline; }
  .rec-region { font-size: .7rem; color: var(--muted); margin-top: 1px; }
  .rec-temp { font-size: .72rem; color: var(--muted); margin-left: 3px; }
  .sch-free { color: #27ae60; font-size: .78rem; }
  .sch-busy { color: #e67e22; font-size: .78rem; }
  .sch-full { color: #e74c3c; font-size: .78rem; }
  .score-chip { display: inline-block; background: #4f80ff; color: #fff; border-radius: 999px; padding: 2px 11px; font-size: .78rem; font-weight: 700; }

  /* ── Cursor blink ── */
  .cursor { display: inline-block; width: 2px; height: 1em; background: currentColor; vertical-align: text-bottom; animation: blink-cur .7s step-end infinite; margin-left: 1px; }
  @keyframes blink-cur { 50% { opacity: 0; } }
</style>
</head>
<body>

<header>
  <span>🤖</span>
  <h1>Secure Agent MVP</h1>
  <span class="badge">MAF · gpt-4o</span>
  <div class="theme-toggle" onclick="toggleTheme()" title="테마 전환">
    <div class="toggle-track"><div class="toggle-knob"></div></div>
    <span class="toggle-label" id="toggle-label">다크</span>
  </div>
</header>

<div id="chat">
  <div class="msg-row agent">
    <div>
      <div class="agent-name">SuperAgent</div>
      <div class="bubble">안녕하세요! 날씨, 골프장 예약, 일정을 조회해 드립니다.<br><br>예시 질문:<br>• "이번 달 서울 날씨 알려줘"<br>• "이번 주말 수도권 골프장 예약 가능한 데 있어?"<br>• "오늘 내 일정 보여줘"<br>• "다음 주 날씨랑 일정 같이 알려줘"</div>
    </div>
  </div>
</div>

<div id="input-area">
  <textarea id="user-input" rows="1" placeholder="메시지를 입력하세요… (Ctrl+Enter로 줄바꿈, Enter로 전송)"></textarea>
  <button id="send-btn" onclick="sendMessage()">전송</button>
</div>

<script>
const chatEl  = document.getElementById('chat');
const inputEl = document.getElementById('user-input');
const sendBtn = document.getElementById('send-btn');
let sessionId = '';

// ── Theme toggle ──────────────────────────────────────────────────────────────
const html = document.documentElement;
const saved = localStorage.getItem('theme') || 'light';
setTheme(saved);

function setTheme(theme) {
  html.setAttribute('data-theme', theme);
  document.getElementById('toggle-label').textContent = theme === 'dark' ? '라이트' : '다크';
  localStorage.setItem('theme', theme);
}
function toggleTheme() {
  setTheme(html.getAttribute('data-theme') === 'dark' ? 'light' : 'dark');
}

// ── Input auto-resize ─────────────────────────────────────────────────────────
inputEl.addEventListener('input', () => {
  inputEl.style.height = 'auto';
  inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px';
});
inputEl.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.ctrlKey && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

// ── Message helpers ───────────────────────────────────────────────────────────
function escHtml(s) {
  return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/\n/g,'<br>');
}
function scrollDown() { chatEl.scrollTop = chatEl.scrollHeight; }

function appendUserMsg(text) {
  const row = document.createElement('div');
  row.className = 'msg-row user';
  row.innerHTML = `<div class="bubble">${escHtml(text)}</div>`;
  chatEl.appendChild(row);
  scrollDown();
}

function createAgentRow() {
  const row = document.createElement('div');
  row.className = 'msg-row agent';
  row.innerHTML = `
    <div style="width:100%">
      <div class="agent-name">SuperAgent</div>
      <div class="stream-status">
        <div class="status-dots"><span></span><span></span><span></span></div>
        <span class="status-text">연결 중...</span>
      </div>
      <div class="agent-bubble-wrap"></div>
      <div class="cards"></div>
    </div>`;
  chatEl.appendChild(row);
  scrollDown();
  return row;
}

// ── SSE send ─────────────────────────────────────────────────────────────────
async function sendMessage() {
  const text = inputEl.value.trim();
  if (!text) return;

  inputEl.value = '';
  inputEl.style.height = 'auto';
  sendBtn.disabled = true;

  appendUserMsg(text);
  const agentRow = createAgentRow();
  const statusEl  = agentRow.querySelector('.stream-status');
  const statusTxt = agentRow.querySelector('.status-text');
  const bubbleWrap = agentRow.querySelector('.agent-bubble-wrap');
  const cardsEl   = agentRow.querySelector('.cards');

  let bubbleEl = null;
  let cursorEl = null;
  let textBuf  = '';

  function ensureBubble() {
    if (!bubbleEl) {
      bubbleEl = document.createElement('div');
      bubbleEl.className = 'bubble';
      cursorEl = document.createElement('span');
      cursorEl.className = 'cursor';
      bubbleEl.appendChild(cursorEl);
      bubbleWrap.appendChild(bubbleEl);
    }
  }

  try {
    const resp = await fetch('/api/v1/chat/stream', {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({message: text, session_id: sessionId}),
    });

    const reader  = resp.body.getReader();
    const decoder = new TextDecoder();
    let buffer = '';

    while (true) {
      const {done, value} = await reader.read();
      if (done) break;

      buffer += decoder.decode(value, {stream: true});
      const parts = buffer.split('\n\n');
      buffer = parts.pop() ?? '';

      for (const part of parts) {
        const line = part.trim();
        if (!line.startsWith('data: ')) continue;
        let ev;
        try { ev = JSON.parse(line.slice(6)); } catch { continue; }

        switch (ev.type) {
          case 'session':
            sessionId = ev.session_id;
            break;

          case 'status':
            statusTxt.textContent = ev.message;
            scrollDown();
            break;

          case 'card':
            cardsEl.insertAdjacentHTML('beforeend', renderCard(ev.card));
            scrollDown();
            break;

          case 'text_chunk':
            ensureBubble();
            textBuf += ev.text;
            // insert text before cursor
            const textNode = document.createTextNode(ev.text);
            bubbleEl.insertBefore(textNode, cursorEl);
            scrollDown();
            break;

          case 'error':
            cardsEl.insertAdjacentHTML('beforeend',
              `<div style="color:#e74c3c;font-size:.82rem;padding:4px 0">⚠️ ${escHtml(ev.message)}</div>`);
            break;

          case 'done':
            statusEl.remove();
            if (cursorEl) cursorEl.remove();
            break;
        }
      }
    }
  } catch (err) {
    statusEl.remove();
    bubbleWrap.innerHTML = `<div class="bubble">⚠️ 서버 오류가 발생했습니다. 잠시 후 다시 시도해 주세요.</div>`;
  } finally {
    sendBtn.disabled = false;
    inputEl.focus();
  }
}

// ── Card renderers ────────────────────────────────────────────────────────────
function renderCard(card) {
  switch (card.type) {
    case 'weather_calendar': return renderWeather(card.data);
    case 'golf_slots':       return renderGolf(card.data);
    case 'schedule_list':    return renderSchedule(card.data);
    case 'recommendation':   return renderRecommendation(card.data);
    default: return `<div class="card"><div class="card-body">${escHtml(JSON.stringify(card))}</div></div>`;
  }
}

function renderWeather(d) {
  const dows   = ['일','월','화','수','목','금','토'];
  const today  = new Date().toISOString().slice(0,10);
  const firstDay = new Date(d.year, d.month - 1, 1).getDay();

  let grid = dows.map(w => `<div class="cal-dow">${w}</div>`).join('');
  for (let i = 0; i < firstDay; i++) grid += `<div class="cal-day cal-empty"></div>`;

  for (const day of d.days) {
    const dn = parseInt(day.date.slice(-2));
    const isToday = day.date === today;
    grid += `<div class="cal-day${isToday ? ' today' : ''}">
      <div class="dn">${dn}</div>
      <div class="icon">${day.icon}</div>
      <div class="tmp">${day.min_temp}°~${day.max_temp}°</div>
    </div>`;
  }

  return `<div class="card">
    <div class="card-header">🗓️ ${d.year}년 ${d.month}월 날씨 (${d.location})</div>
    <div class="card-body"><div class="cal-grid">${grid}</div></div>
    <div class="card-footer">※ 14일 이후는 기후 평년값 기반 예측</div>
  </div>`;
}

function renderGolf(d) {
  if (!d.courses || d.courses.length === 0) {
    return `<div class="card">
      <div class="card-header">⛳ 골프장 예약 현황</div>
      <div class="card-body"><p class="no-data">조회 기간(${d.date_from} ~ ${d.date_to}) 내 예약 가능한 슬롯이 없습니다.</p></div>
    </div>`;
  }
  const rows = d.courses.map(c => `<tr>
    <td><strong>${escHtml(c.name)}</strong><br><span style="color:var(--muted);font-size:.73rem">${escHtml(c.region)}</span></td>
    <td>${c.date}</td>
    <td>${c.available_slots}타임
      <div class="tee-chips">${c.tee_times.map(t=>`<span class="tee-chip">${t}</span>`).join('')}</div>
    </td>
    <td>${escHtml(c.price_range)}</td>
  </tr>`).join('');

  return `<div class="card">
    <div class="card-header">⛳ 수도권 골프장 예약 현황 (${d.date_from} ~ ${d.date_to})</div>
    <div class="card-body">
      <table class="golf-table">
        <thead><tr><th>골프장</th><th>날짜</th><th>가능 슬롯</th><th>가격대</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>
    <div class="card-footer">기준일: ${d.query_time} · 캐시 TTL 30분 · robots.txt 준수</div>
  </div>`;
}

function renderRecommendation(d) {
  if (!d.recommendations || d.recommendations.length === 0) {
    return `<div class="card rec-card">
      <div class="card-header">🏆 골프 라운드 TOP 5 추천</div>
      <div class="card-body"><p class="no-data">조건에 맞는 추천 결과가 없습니다. (기간 또는 지역을 넓혀 보세요)</p></div>
    </div>`;
  }

  const rows = d.recommendations.map(r => {
    const rankClass = r.rank <= 3 ? `rank-${r.rank}` : 'rank-4';
    const schClass  = r.schedule_label.includes('없음') || r.schedule_label.includes('저녁') || r.schedule_label.includes('미조회')
                      ? 'sch-free'
                      : r.schedule_label.includes('종일') ? 'sch-full' : 'sch-busy';
    return `<tr>
      <td style="text-align:center"><span class="rank-badge ${rankClass}">${r.rank}</span></td>
      <td>
        <div style="white-space:nowrap">${r.date.slice(5)} (${r.weekday})</div>
        ${r.is_weekend ? '<span class="weekend-badge">주말</span>' : ''}
      </td>
      <td>
        <a class="course-link" href="${escHtml(r.link)}" target="_blank" rel="noopener">${escHtml(r.course_name)}</a>
        <div class="rec-region">${escHtml(r.region)}</div>
      </td>
      <td style="white-space:nowrap">${r.weather_icon}<span class="rec-temp">${escHtml(r.weather_temp)}</span></td>
      <td><span class="${schClass}">${escHtml(r.schedule_label)}</span></td>
      <td style="white-space:nowrap"><strong>${r.best_tee_time}</strong></td>
      <td style="white-space:nowrap;font-size:.78rem">${escHtml(r.price_range)}</td>
      <td style="text-align:center"><span class="score-chip">${r.score}</span></td>
    </tr>`;
  }).join('');

  return `<div class="card rec-card">
    <div class="card-header">🏆 골프 라운드 TOP 5 추천 <span style="font-weight:400;font-size:.75rem;margin-left:6px">(${d.date_from} ~ ${d.date_to})</span></div>
    <div class="card-body">
      <div class="criteria-bar">📊 채점 기준: ${escHtml(d.criteria)}</div>
      <div style="overflow-x:auto">
        <table class="rec-table">
          <thead>
            <tr>
              <th style="text-align:center">#</th>
              <th>날짜</th>
              <th>골프장 (예약 링크)</th>
              <th>날씨</th>
              <th>내 일정</th>
              <th>추천 티타임</th>
              <th>가격대</th>
              <th style="text-align:center">점수</th>
            </tr>
          </thead>
          <tbody>${rows}</tbody>
        </table>
      </div>
    </div>
    <div class="card-footer">※ 폭우 예보일 자동 제외 · 골프장명 클릭 시 네이버 예약 페이지로 이동</div>
  </div>`;
}

function renderSchedule(d) {
  const dows = ['(일)','(월)','(화)','(수)','(목)','(금)','(토)'];
  let content = '';
  for (const [dateStr, events] of Object.entries(d.schedules)) {
    const dt  = new Date(dateStr + 'T00:00:00');
    const dow = dows[dt.getDay()];
    const label = `${dateStr.slice(5)} ${dow}`;
    const items = events.length === 0
      ? `<div class="sch-empty">일정 없음</div>`
      : events.map(e => `<div class="sch-item"><span class="sch-time">${e.time}</span><span>${escHtml(e.title)}</span></div>`).join('');
    content += `<div class="sch-day"><div class="sch-date">${label}</div>${items}</div>`;
  }
  return `<div class="card">
    <div class="card-header">📅 내 일정 (${d.date_from} ~ ${d.date_to})</div>
    <div class="card-body">${content}</div>
    <div class="card-footer">Mock MSA · seed=42 · 동일 날짜 동일 결과 보장</div>
  </div>`;
}
</script>
</body>
</html>
